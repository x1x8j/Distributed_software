spring:
  datasource:
    # ShardingSphere-JDBC 驱动，读取 classpath:shardingsphere.yaml 做分库分表路由
    driver-class-name: org.apache.shardingsphere.driver.ShardingSphereDriver
    url: jdbc:shardingsphere:classpath:shardingsphere.yaml
    # username/password 由 shardingsphere.yaml 内每个数据源单独配置，此处不填
  autoconfigure:
    # 排除 Spring Boot 默认 DataSource 自动配置，避免与 ShardingSphere 冲突
    exclude: org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:redis}
      port: ${SPRING_DATA_REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 3
    consumer:
      group-id: seckill-order-processor
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      enable-auto-commit: true

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

server:
  port: ${SERVER_PORT:8085}

seckill:
  worker-id: ${WORKER_ID:0}
