<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Flash Mall - Static Page</title>
  <style>
    body { font-family: Arial, sans-serif; margin:40px }
    .box { border:1px solid #ddd; padding:20px; max-width:600px }
    button { padding:8px 12px }
  </style>
</head>
<body>
  <h1>Flash Mall - Static Page (served by Nginx)</h1>
  <div class="box">
    <p>This is a static page served directly by Nginx. Use the button below to call the backend <code>/api/users/health</code> endpoint (proxied by Nginx).</p>
    <button id="call">Call /api/users/health</button>
    <pre id="result"></pre>
  </div>

  <script>
    document.getElementById('call').addEventListener('click', async function(){
      try{
        const res = await fetch('/api/users/health');
        const text = await res.text();
        document.getElementById('result').textContent = 'Status: '+res.status + '\n' + text;
      } catch(e){
        document.getElementById('result').textContent = 'Error: '+e;
      }
    });
  </script>
</body>
</html>
