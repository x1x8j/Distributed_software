services:
  # ── MySQL 主库 ──────────────────────────────────────────────────────────────
  mysql-master:
    image: bitnami/mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpwd
      MYSQL_DATABASE: flashmall
      MYSQL_REPLICATION_MODE: master
      MYSQL_REPLICATION_USER: replicator
      MYSQL_REPLICATION_PASSWORD: repl_pass
    volumes:
      # 初始化脚本只挂主库，从库通过 binlog 自动同步
      - ./flash-mall-user-service/src/main/resources/schema.sql:/docker-entrypoint-initdb.d/01_users.sql:ro
      - ./flash-mall-product-service/src/main/resources/schema.sql:/docker-entrypoint-initdb.d/02_products.sql:ro
      - ./flash-mall-seckill-service/src/main/resources/schema.sql:/docker-entrypoint-initdb.d/03_seckill.sql:ro
      - ./flash-mall-seckill-service/src/main/resources/schema_shard.sql:/docker-entrypoint-initdb.d/04_seckill_shard.sql:ro
      - ./flash-mall-inventory-service/src/main/resources/schema.sql:/docker-entrypoint-initdb.d/05_inventory.sql:ro
      - ./flash-mall-order-service/src/main/resources/schema.sql:/docker-entrypoint-initdb.d/06_order.sql:ro
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-prootpwd"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── MySQL 从库（只读，接收主库 binlog 同步）──────────────────────────────────
  mysql-slave:
    image: bitnami/mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpwd
      MYSQL_REPLICATION_MODE: slave
      MYSQL_REPLICATION_USER: replicator
      MYSQL_REPLICATION_PASSWORD: repl_pass
      MYSQL_MASTER_HOST: mysql-master
      MYSQL_MASTER_PORT_NUMBER: 3306
      MYSQL_MASTER_ROOT_PASSWORD: rootpwd
    depends_on:
      mysql-master:
        condition: service_healthy
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-prootpwd"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  # ── Kafka（KRaft 模式，无需 ZooKeeper）────────────────────────────────────
  kafka:
    image: bitnami/kafka:3.7
    environment:
      - KAFKA_CFG_NODE_ID=0
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=true
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD", "kafka-topics.sh", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ── user-service × 2 ────────────────────────────────────────────────────────
  backend1:
    build:
      context: .
      dockerfile: flash-mall-user-service/Dockerfile
    environment:
      - SERVER_PORT=8081
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-master:3306/flashmall?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=rootpwd
    depends_on:
      mysql-master:
        condition: service_healthy
    ports:
      - "8081:8081"

  backend2:
    build:
      context: .
      dockerfile: flash-mall-user-service/Dockerfile
    environment:
      - SERVER_PORT=8082
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-master:3306/flashmall?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=rootpwd
    depends_on:
      mysql-master:
        condition: service_healthy
    ports:
      - "8082:8082"

  # ── product-service × 2（写主库 / 读从库）──────────────────────────────────
  product1:
    build:
      context: .
      dockerfile: flash-mall-product-service/Dockerfile
    environment:
      - SERVER_PORT=8083
      - MASTER_DATASOURCE_URL=jdbc:mysql://mysql-master:3306/flashmall?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
      - SLAVE_DATASOURCE_URL=jdbc:mysql://mysql-slave:3306/flashmall?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=rootpwd
      - SPRING_DATA_REDIS_HOST=redis
    depends_on:
      mysql-master:
        condition: service_healthy
      mysql-slave:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "8083:8083"

  product2:
    build:
      context: .
      dockerfile: flash-mall-product-service/Dockerfile
    environment:
      - SERVER_PORT=8084
      - MASTER_DATASOURCE_URL=jdbc:mysql://mysql-master:3306/flashmall?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
      - SLAVE_DATASOURCE_URL=jdbc:mysql://mysql-slave:3306/flashmall?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=rootpwd
      - SPRING_DATA_REDIS_HOST=redis
    depends_on:
      mysql-master:
        condition: service_healthy
      mysql-slave:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "8084:8084"

  # ── seckill-service × 2（Redis预扣 + Outbox，WORKER_ID不同保证雪花ID唯一）
  seckill1:
    build:
      context: .
      dockerfile: flash-mall-seckill-service/Dockerfile
    environment:
      - SERVER_PORT=8085
      - WORKER_ID=0
      - SPRING_DATA_REDIS_HOST=redis
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    depends_on:
      mysql-master:
        condition: service_healthy
      redis:
        condition: service_started
      kafka:
        condition: service_healthy
    ports:
      - "8085:8085"

  seckill2:
    build:
      context: .
      dockerfile: flash-mall-seckill-service/Dockerfile
    environment:
      - SERVER_PORT=8086
      - WORKER_ID=1
      - SPRING_DATA_REDIS_HOST=redis
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    depends_on:
      mysql-master:
        condition: service_healthy
      redis:
        condition: service_started
      kafka:
        condition: service_healthy
    ports:
      - "8086:8086"

  # ── inventory-service（独立库 flashmall_inventory，消费 seckill.deduct）──
  inventory:
    build:
      context: .
      dockerfile: flash-mall-inventory-service/Dockerfile
    environment:
      - SERVER_PORT=8087
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-master:3306/flashmall_inventory?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=rootpwd
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    depends_on:
      mysql-master:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8087:8087"

  # ── order-service（独立库 flashmall_order，消费 seckill.orders / inventory.result）
  order:
    build:
      context: .
      dockerfile: flash-mall-order-service/Dockerfile
    environment:
      - SERVER_PORT=8088
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-master:3306/flashmall_order?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=rootpwd
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    depends_on:
      mysql-master:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8088:8088"

  # ── Nginx ───────────────────────────────────────────────────────────────────
  nginx:
    build:
      context: ./nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/upstreams_rr.conf:/etc/nginx/upstreams.conf:ro
    depends_on:
      - backend1
      - backend2
      - product1
      - product2
      - seckill1
      - seckill2
      - inventory
      - order
