server:
  port: ${SERVER_PORT:8083}

spring:
  application:
    name: flash-mall-product-service
  config:
    import: optional:nacos:${spring.application.name}.yaml
  datasource:
    dynamic:
      primary: master
      strict: false
      datasource:
        master:
          url: ${MASTER_DATASOURCE_URL:jdbc:mysql://mysql-master:3306/flashmall?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai}
          username: ${SPRING_DATASOURCE_USERNAME:root}
          password: ${SPRING_DATASOURCE_PASSWORD:rootpwd}
          driver-class-name: com.mysql.cj.jdbc.Driver
        slave:
          url: ${SLAVE_DATASOURCE_URL:jdbc:mysql://mysql-slave:3306/flashmall?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai}
          username: ${SPRING_DATASOURCE_USERNAME:root}
          password: ${SPRING_DATASOURCE_PASSWORD:rootpwd}
          driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:redis}
      port: ${SPRING_DATA_REDIS_PORT:6379}
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:nacos:8848}
      config:
        server-addr: ${NACOS_ADDR:nacos:8848}
        file-extension: yaml
        refresh-enabled: true
    sentinel:
      transport:
        dashboard: ${SENTINEL_DASHBOARD:sentinel-dashboard:8858}
        port: 8719
      eager: true

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
