spring:
  datasource:
    dynamic:
      primary: master          # 默认主库（写操作），@DS("slave") 显式切换读操作
      strict: false
      datasource:
        master:
          url: ${MASTER_DATASOURCE_URL:jdbc:mysql://mysql-master:3306/flashmall?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai}
          username: ${SPRING_DATASOURCE_USERNAME:root}
          password: ${SPRING_DATASOURCE_PASSWORD:rootpwd}
          driver-class-name: com.mysql.cj.jdbc.Driver
        slave:
          url: ${SLAVE_DATASOURCE_URL:jdbc:mysql://mysql-slave:3306/flashmall?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai}
          username: ${SPRING_DATASOURCE_USERNAME:root}
          password: ${SPRING_DATASOURCE_PASSWORD:rootpwd}
          driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:redis}
      port: ${SPRING_DATA_REDIS_PORT:6379}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

server:
  port: ${SERVER_PORT:8083}
