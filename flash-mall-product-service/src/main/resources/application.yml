spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://mysql:3306/flashmall?useSSL=false&useUnicode=true&characterEncoding=utf8mb4&serverTimezone=Asia/Shanghai}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:rootpwd}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      # Spring Boot 3.x 正确前缀，docker-compose 通过 SPRING_DATA_REDIS_HOST 覆盖
      host: ${SPRING_DATA_REDIS_HOST:redis}
      port: ${SPRING_DATA_REDIS_PORT:6379}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

server:
  port: ${SERVER_PORT:8083}
