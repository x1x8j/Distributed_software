spring:
  datasource:
    # 使用 docker-compose 中的 mysql 服务名作为 host
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://mysql:3306/flashmall?useSSL=false&useUnicode=true&characterEncoding=utf8mb4&serverTimezone=Asia/Shanghai}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:rootpwd}
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

server:
  # 支持通过环境变量覆盖端口（在 docker-compose 中我们会设置 SERVER_PORT）
  port: ${SERVER_PORT:8081}
